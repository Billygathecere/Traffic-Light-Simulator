<!DOCTYPE html>
<html lang="en">
<head>
    <!-- CSS link -->
    <link rel="stylesheet" href="Traffic.css">
    <!-- Fontawesome link -->
     <script src="https://kit.fontawesome.com/1d68a8fcd4.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic_Lights</title>
</head>
<body>
    <!-- Pedestrian side -->
    <div class="light-checker">
        <h1>
            <i class="fas fa-walking"></i>
            What is the traffic light?
        </h1>
        <div class="traffic-light" id="traffic-light">
            <div class="light-red" onclick="pedestrianLight(event)" >
            </div>
            <div class="light-yellow" onclick="pedestrianLight(event)" >
            </div>
            <div class="light-green" onclick="pedestrianLight(event)" >
            </div>
        </div>
        <div class="pedestrian-lights" id="pedestrian-lights">
        </div>
        <div class="alertMessage">
        <p id="alertMessage">
        </p>
        </div>

    </div>

    <!-- Vehicles  side -->
     <div class="traffic-checker">
        <h1>
            <i class="fas fa-car"></i>
            What is the traffic light?
        </h1>
        <div class="traffic-light">
            <div class="light-red" onclick="carLight(event)">
            </div>
            <div class="light-yellow" onclick="carLight(event)">
            </div>
            <div class="light-green" onclick="carLight(event)">
            </div>
        </div>
        <div class="car-lights" id="car-lights"></div>
        
        <div class="alertNotification">
        <p id="alertNotification">
        </p>
        </div>

     </div>
     <script src="Traffic.js"></script>
</body>
</html>
